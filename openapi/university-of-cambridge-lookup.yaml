            be included (people who are no longer members of the University).
            Defaults to `false`.
          required: false
          schema:
            type: boolean
        - name: identifier
          in: query
          description: |-
            The identifier (CRSid) of the person to
            start after, or `null` to start from the first person.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: |-
            The maximum number of people to return.
            Defaults to 100.
          required: false
          schema:
            type: integer
            format: int32
        - name: fetch
          in: query
          description: |-
            A comma-separated list of any additional
            attributes or references to fetch.
          required: false
          schema:
            type: string
      responses:
        200:
          description: |-
            The requested people (in identifier order).
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
