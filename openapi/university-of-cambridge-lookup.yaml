            type: string
        - name: approxMatches
          in: query
          description: |-
            Flag to enable more approximate
            matching in the search, causing more results to be returned. Defaults
            to `false`. This is ignored for LQL queries.
          required: false
          schema:
            type: boolean
        - name: includeCancelled
          in: query
          description: |-
            Flag to allow cancelled people to
            be included (people who are no longer members of the University).
            Defaults to `false`.
          required: false
          schema:
            type: boolean
        - name: misStatus
          in: query
          description: |-
            The type of people to search for. This may
            be
            
            * `"staff"` - only include people whose MIS status is
              `""` (empty string), `"staff"`, or
              `"staff,student"`.
            
            * `"student"` - only include people whose MIS status is set to
              `"student"` or `"staff,student"`.
            
            Otherwise all matching people will be included (the default). Note
            that the `"staff"` and `"student"` options are not
            mutually exclusive.
          required: false
          schema:
            type: string
        - name: attributes
          in: query
          description: |-
            A comma-separated list of attributes to
            consider when searching. If this is `null` (the default) then
            all attribute schemes marked as searchable will be included. This is
            ignored for LQL queries.
          required: false
          schema:
            type: string
      responses:
        200:
          description: |-
            The number of matching people.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      value:
                        type: integer
                        format: int32
                    description: |-
                      Class representing the top-level container for all XML and JSON results.
                      This may be just a simple textual value or it may contain more complex
                      entities such as people, institutions, groups, attributes, etc.
        default:
          $ref: '#/components/responses/ServerError'
